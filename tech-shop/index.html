<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AppInformatica.com</title>
    <link rel="stylesheet" href="../tech-shop/css/output.css" />
  </head>

  <body>
    <header class="header-principal">
      <div class="flex flex-row justify-between my-space-3 mx-space-3">
        <img
          src="./img/otros/Logo_Appinformatica.png"
          class="logo"
          alt="Logo"
        />

        <nav class="flex" aria-label="Navegación principal">
          <ul class="flex items-center gap-4">
            <li class="hidden md:block"><a href="#home">Inicio</a></li>
            <li class="hidden md:block"><a href="#catalog">Productos</a></li>
            <li class="flex items-center">
              <a href="#cart">
                <img
                  class="icon"
                  src="./img/otros/carrito-de-compras.png"
                  alt="Icono de carrito de compras"
                />
                 <span id="cart-count" class="cart-count">0</span>
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </header>
    <div class="container-mobile">
      <main>
        <!-- CATALOG-->
        <section id="catalog">
          <header class="m-4">
            <h1 class="">Catálogo de productos</h1>
            <p>Componentes y accesorios de informática.</p>
          </header>

          <div class="catalog-grid" id="product-grid">
            <!-- AQUI SE CARGARAN TODOS LOS PRODUCTOS DE JSON-->
          </div>
        </section>

        <!-- CART -->
        <section id="cart">
          <header>
            <h2>Carrito</h2>
          </header>

          <table class="w-full border-separate border-spacing-0">
            <thead class="cart-thead">
              <tr>
                <th>Producto</th>
                <th>Uds.</th>
                <th>Precio/ud.</th>
                <th>Total</th>
              </tr>
            </thead>
            <tbody class="cart-tbody">
              <tr>
                <th scope="row">Gráfica</th>
                <td>1</td>
                <td>169 €</td>
                <td>169 €</td>
              </tr>
              <tr>
                <th scope="row">Memoria RAM</th>
                <td>2</td>
                <td>21 €</td>
                <td>42 €</td>
              </tr>
            </tbody>
            <tfoot class="cart-tfoot">
              <tr>
                <th scope="row" colspan="3">Total</th>
                <td>211 €</td>
              </tr>
            </tfoot>
          </table>
        </section>
      </main>

      <footer>
        <p>© 2026 Botiga Tech</p>

        <p>Métodos de pago aceptados:</p>
        <ul class="flex justify-between gap-2 py-space-3">
          <li>
            <img
              class="payCard"
              src="./img/pago/amex.gif"
              alt="pago con amex"
            />
          </li>
          <li>
            <img
              class="payCard"
              src="./img/pago/aurora.gif"
              alt="pago con aurora"
            />
          </li>
          <li>
            <img
              class="payCard"
              src="./img/pago/mastercard.gif"
              alt="pago con mastercard"
            />
          </li>
          <li>
            <img
              class="payCard"
              src="./img/pago/visa.gif"
              alt="pago con visa"
            />
          </li>
        </ul>
      </footer>
    </div>
    <script src="./js/script.js"></script>
  </body>
</html>
