<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Botiga Tech</title>
    <link rel="stylesheet" href="../tech-shop/css/output.css" />
  </head>

  <body>
    <header>
      <div class="container">
        <h1 class="site-logo">Botiga Tech</h1>

        <nav aria-label="Navegación principal">
          <ul>
            <li><a href="#home">Inicio</a></li>
            <li><a href="#catalog">Productos</a></li>
            <li><a href="#cart">Carrito</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <!-- CATALOG-->
      <section id="catalog">
        <header>
          <h2>Catálogo de productos</h2>
          <p>Componentes y accesorios de informática.</p>
        </header>

        <div class="catalog-grid" id="product-grid"></div>
      </section>

      <!-- CART -->
      <section id="cart">
        <header>
          <h2>Carrito</h2>
        </header>

        <table>
          <thead>
            <tr>
              <th scope="col">Producto</th>
              <th scope="col">Uds.</th>
              <th scope="col">Precio/ud.</th>
              <th scope="col">Total</th>
            </tr>
          </thead>

          <tbody>
            <tr>
              <th scope="row">Gráfica</th>
              <td>1</td>
              <td>169 €</td>
              <td>169 €</td>
            </tr>

            <tr>
              <th scope="row">Memoria RAM</th>
              <td>2</td>
              <td>21 €</td>
              <td>42 €</td>
            </tr>
          </tbody>

          <tfoot>
            <tr>
              <th scope="row" colspan="3">Total</th>
              <td>211 €</td>
            </tr>
          </tfoot>
        </table>
      </section>
    </main>

    <footer>
      <p>© 2026 Botiga Tech</p>

      <p>Métodos de pago aceptados</p>
    </footer>

    <script src="./js/script.js"></script>
  </body>
</html>
